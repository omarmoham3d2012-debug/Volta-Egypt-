<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volta Egypt</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a") center/cover;
  animation: zoom 20s infinite alternate;
  filter: brightness(0.4);
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

.player {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  height: 80%;
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 20%;
}

.btn {
  padding: 10px 20px;
  background: gold;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

/* PRODUCTS */
.products {
  display: none;
  padding: 40px;
  text-align: center;
}

.product {
  background: #1a1a1a;
  padding: 20px;
  margin: 20px;
  display: inline-block;
  width: 250px;
  border-radius: 10px;
}

.product img {
  width: 100%;
}

/* CART */
.cart {
  padding: 30px;
  background: #000;
}

.cart-item {
  margin: 10px 0;
}

input {
  padding: 8px;
  margin: 5px;
  width: 200px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="file:///mnt/data/file_00000000787c7243bcd99be42ced7c5d" class="player">

  <div class="hero-content">
    <h1>Volta Egypt</h1>
    <p>Here in Volta Egypt, we sells footballs</p>
    <button class="btn" onclick="showProducts()">Shop Now</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

  <div class="product">
    <img src="file:///mnt/data/file_00000000e3c071f4ba887a3b6c0978a1">
    <h3>Jabulani Ball</h3>
    <p>1400 EGP</p>
    <button class="btn" onclick="addToCart('Jabulani',1400)">Add</button>
  </div>

  <div class="product">
    <img src="file:///mnt/data/file_00000000cbe871f4891110e22a647435">
    <h3>Trionda Ball</h3>
    <p>800 EGP</p>
    <button class="btn" onclick="addToCart('Trionda',800)">Add</button>
  </div>

</div>

<!-- CART -->
<div class="cart">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: <span id="total">0</span> EGP</h3>

  <h3>Checkout</h3>
  <input id="name" placeholder="Your Name"><br>
  <input id="address" placeholder="Address"><br>
  <input id="phone" placeholder="Phone"><br>

  <p>Payment: Cash on Delivery</p>
  <button class="btn" onclick="checkout()">Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showProducts() {
  document.getElementById("products").style.display = "block";
  window.scrollTo(0, document.getElementById("products").offsetTop);
}

function addToCart(name, price) {
  let item = cart.find(i => i.name === name);
  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }
  saveCart();
  renderCart();
}

function renderCart(){
  let container = document.getElementById("cartItems");
  container.innerHTML = "";
  let total = 0;

  cart.forEach((item, index)=>{
    total += item.price * item.qty;

    container.innerHTML += `
      <div class="cart-item">
        ${item.name} - ${item.price} EGP 
        x ${item.qty}
        <button onclick="changeQty(${index},1)">+</button>
        <button onclick="changeQty(${index},-1)">-</button>
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").textContent = total;
}

function changeQty(index, change){
  cart[index].qty += change;
  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }
  saveCart();
  renderCart();
}

function removeItem(index){
  cart.splice(index,1);
  saveCart();
  renderCart();
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function checkout(){
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(!name || !address || !phone){
    alert("Fill all details!");
    return;
  }

  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  alert("Order placed successfully!\nCash on Delivery");

  cart = [];
  saveCart();
  renderCart();
}

renderCart();
</script>

</body>
</html>
